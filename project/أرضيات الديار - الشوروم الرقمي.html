document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ot;, &quot;options&quot;: [&quot;تراثي دافئ&quot;, &quot;عصري مينمال&quot;], &quot;default&quot;: &quot;تراثي دافئ&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;showcase&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.arStageRef = React.createRef();\n    this.arVideoRef = React.createRef();\n    this.arUploadRef = React.createRef();\n    this.chatScrollRef = React.createRef();\n    this.arFloorsRef = React.createRef();\n    this.testiRef = React.createRef();\n    this.state = {\n      lang:'ar', activeRoom:'majlis', heroFloor:'walnut', autoCycle:true,\n      arTab:'upload', arImage:null, arLinePct:52, arFloor:'walnut', arCamState:'idle',\n      catFilter:'all',\n      calcProductId:'walnut', calcArea:'40',\n      advisorStep:0, advisorAns:{}, advisorDone:false,\n      colorImg:null, colorDom:null, colorMatch:null,\n      compareAId:'walnut', compareBId:'porcelain1',\n      chatOpen:false, chatInput:'', chatMsgs:[{role:'bot', key:'welcome'}],\n      zoom:null,\n      tex:{}\n    };\n  }\n\n  componentDidMount(){\n    // textures: solid colors for Wix, async generation for other hosts\n    const tex = {};\n    this.PRODUCTS.forEach(p=>{ \n      tex[p.id] = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22320%22%3E%3Crect fill=%22'+p.color.slice(1)+'%22 width=%22320%22 height=%22320%22/%3E%3C/svg%3E';\n      if(!window.isWix) this.genTextureAsync(p.tx, p.color, p.tx2, (dataUrl)=>{ this.setState(s=>({tex:{...s.tex,[p.id]:dataUrl}})); });\n    });\n    this.setState({tex});\n    // auto cycle hero floors (wow)\n    this._cycle = setInterval(()=>{\n      if(this.props.showcase===false) return;\n      if(!this.state.autoCycle){ clearInterval(this._cycle); return; }\n      const ids = this.HERO_FLOORS;\n      const i = ids.indexOf(this.state.heroFloor);\n      this.setState({heroFloor: ids[(i+1)%ids.length]});\n    }, 1600);\n  }\n  componentWillUnmount(){ clearInterval(this._cycle); if(this._stream){ this._stream.getTracks().forEach(t=>t.stop()); } }\n  componentDidUpdate(_,prev){\n    if(prev && prev.arImage!==this.state.arImage && this.state.arImage && this.arUploadRef.current){\n      this.arUploadRef.current.style.backgroundImage='url('+this.state.arImage+')';\n    }\n    if(prev && prev.chatMsgs!==this.state.chatMsgs && this.chatScrollRef.current){\n      const el=this.chatScrollRef.current; setTimeout(()=>{el.scrollTop=el.scrollHeight;},30);\n    }\n  }\n\n  /* ---------- DATA ---------- */\n  get PRODUCTS(){ return [\n    {id:'walnut', cat:'parquet', ar:'باركيه جوز ملكي', en:'Royal Walnut', price:145, install:35, color:'#5a3b22', tx:'wood', tx2:'#3d2716', fam:'warm', char:'lux', warmth:5,luxury:5,water:2,durab:3},\n    {id:'oak', cat:'parquet', ar:'باركيه بلوط طبيعي', en:'Natural Oak', price:120, install:35, color:'#b08a55', tx:'wood', tx2:'#8a6535', fam:'warm', char:'heritage', warmth:4,luxury:4,water:2,durab:3},\n    {id:'greywood', cat:'parquet', ar:'باركيه رمادي حديث', en:'Modern Grey Wood', price:130, install:35, color:'#8e8b86', tx:'wood', tx2:'#5f5e58', fam:'grey', char:'modern', warmth:3,luxury:4,water:2,durab:3},\n    {id:'carrara', cat:'ceramic', ar:'سيراميك رخامي أبيض', en:'Carrara White', price:85, install:25, color:'#e9e6df', tx:'marble', tx2:'#b9b6ad', fam:'light', char:'lux', warmth:2,luxury:5,water:5,durab:4},\n    {id:'beige', cat:'ceramic', ar:'سيراميك بيج كلاسيك', en:'Classic Beige', price:70, install:25, color:'#d8c8ac', tx:'ceramic', tx2:'#bda886', fam:'light', char:'heritage', warmth:3,luxury:3,water:5,durab:4},\n    {id:'concrete', cat:'ceramic', ar:'سيراميك أسمنتي', en:'Concrete Look', price:75, install:25, color:'#a3a097', tx:'ceramic', tx2:'#85827a', fam:'grey', char:'modern', warmth:2,luxury:3,water:5,durab:4},\n    {id:'porcelain1', cat:'porcelain', ar:'بورسلين كالاكاتا', en:'Calacatta Porcelain', price:160, install:30, color:'#eceae3', tx:'marble', tx2:'#9a9488', fam:'light', char:'lux', warmth:2,luxury:5,water:5,durab:5},\n    {id:'porcelain2', cat:'porcelain', ar:'بورسلين حجري داكن', en:'Dark Stone Porcelain', price:140, install:30, color:'#4f4d47', tx:'stone', tx2:'#2f2e2a', fam:'dark', char:'modern', warmth:2,luxury:4,water:5,durab:5},\n    {id:'porcelain3', cat:'porcelain', ar:'بورسلين رملي', en:'Sand Stone Porcelain', price:130, install:30, color:'#c4 a987'.replace(' ',''), tx:'stone', tx2:'#a08a64', fam:'warm', char:'heritage', warmth:3,luxury:4,water:5,durab:5},\n    {id:'spc1', cat:'spc', ar:'SPC بلوط دافئ', en:'Warm Oak SPC', price:95, install:20, color:'#bd9863', tx:'spc', tx2:'#977440', fam:'warm', char:'practical', warmth:4,luxury:3,water:5,durab:5},\n    {id:'spc2', cat:'spc', ar:'SPC رمادي مطفي', en:'Matte Grey SPC', price:90, install:20, color:'#9a978f', tx:'spc', tx2:'#6f6d66', fam:'grey', char:'practical', warmth:3,luxury:3,water:5,durab:5},\n    {id:'spc3', cat:'spc', ar:'SPC طيني تراثي', en:'Heritage Clay SPC', price:100, install:20, color:'#b06a44', tx:'clay', tx2:'#8a4d2d', fam:'warm', char:'heritage', warmth:4,luxury:4,water:4,durab:4},\n  ]; }\n  get HERO_FLOORS(){ return ['walnut','carrara','porcelain2','spc3','oak']; }\n  prod(id){ return this.PRODUCTS.find(p=>p.id===id); }\n\n  get ROOMS(){ return {\n    majlis:{ar:'مجلس',en:'Majlis', wall:'#d8cdb8', frame:'#b9a982', decor:'#8a6f4a', winSide:'right', decorSide:'left'},\n    bedroom:{ar:'غرفة نوم',en:'Bedroom', wall:'#cdd2cf', frame:'#a7afa9', decor:'#7d8a82', winSide:'left', decorSide:'right'},\n    kitchen:{ar:'مطبخ',en:'Kitchen', wall:'#e2dcd0', frame:'#c2b7a0', decor:'#9a9486', winSide:'right', decorSide:'left'},\n    bathroom:{ar:'حمام',en:'Bathroom', wall:'#cfd9dc', frame:'#a6b3b6', decor:'#8294 97'.replace(' ',''), winSide:'left', decorSide:'right'},\n    courtyard:{ar:'الفناء الخارجي',en:'Outdoor', wall:'#d3d8c6', frame:'#aeb59c', decor:'#6f8a52', winSide:'right', decorSide:'left'},\n  }; }\n\n  /* ---------- TEXTURE GEN ---------- */\n  genTextureAsync(type, base, dark, cb){\n    // async wrapper so Wix can load with solid colors, real textures render after\n    setTimeout(()=>{ cb(this.genTexture(type, base, dark)); }, 100);\n  }\n  shade(hex,amt){\n    let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join('');\n    let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);\n    r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));\n    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');\n  }\n  genTexture(type, base, dark){\n    const S=320, c=document.createElement('canvas'); c.width=S;c.height=S;\n    const x=c.getContext('2d'); const rnd=(a,b)=>a+Math.random()*(b-a);\n    x.fillStyle=base; x.fillRect(0,0,S,S);\n    if(type==='wood'||type==='spc'){\n      const ph = type==='spc'?80:64;\n      for(let y=0;y<S;y+=ph){\n        const off = Math.floor(rnd(-12,12));\n        x.fillStyle=this.shade(base,off); x.fillRect(0,y,S,ph);\n        // grain\n        for(let i=0;i<26;i++){\n          x.strokeStyle='rgba(0,0,0,'+rnd(.03,.09)+')'; x.lineWidth=rnd(.5,1.4); x.beginPath();\n          const gy=y+rnd(2,ph-2); x.moveTo(0,gy);\n          for(let gx=0;gx<=S;gx+=20){ x.lineTo(gx, gy+Math.sin(gx/30+i)*rnd(.5,2)); }\n          x.stroke();\n        }\n        // seam\n        x.strokeStyle='rgba(0,0,0,.18)'; x.lineWidth=type==='spc'?2:1.4; x.beginPath(); x.moveTo(0,y); x.lineTo(S,y); x.stroke();\n        x.strokeStyle='rgba(255,255,255,.06)'; x.beginPath(); x.moveTo(0,y+1.5); x.lineTo(S,y+1.5); x.stroke();\n      }\n    } else if(type==='marble'){\n      x.fillStyle=base; x.fillRect(0,0,S,S);\n      // soft mottle\n      for(let i=0;i<60;i++){ x.fillStyle='rgba(0,0,0,'+rnd(.01,.03)+')'; x.beginPath(); x.arc(rnd(0,S),rnd(0,S),rnd(20,70),0,7); x.fill(); }\n      // veins\n      for(let v=0;v<5;v++){\n        x.strokeStyle='rgba('+(dark?'80,78,70':'150,146,138')+','+rnd(.25,.5)+')'; x.lineWidth=rnd(1,3); x.beginPath();\n        let px=rnd(0,S),py=0; x.moveTo(px,py);\n        while(py<S){ px+=rnd(-40,40); py+=rnd(20,50); x.lineTo(px,py); }\n        x.stroke();\n        // hairline branches\n        x.lineWidth=.6; x.strokeStyle='rgba(120,116,108,.3)';\n      }\n    } else if(type==='stone'){\n      for(let i=0;i<2600;i++){ x.fillStyle='rgba('+(Math.random()<.5?'255,255,255':'0,0,0')+','+rnd(.02,.08)+')'; x.fillRect(rnd(0,S),rnd(0,S),rnd(1,3),rnd(1,3)); }\n      for(let i=0;i<30;i++){ x.fillStyle='rgba(0,0,0,'+rnd(.02,.05)+')'; x.beginPath(); x.arc(rnd(0,S),rnd(0,S),rnd(8,26),0,7); x.fill(); }\n    } else if(type==='clay'){\n      for(let i=0;i<2200;i++){ x.fillStyle='rgba('+(Math.random()<.5?'255,230,200':'90,40,20')+','+rnd(.03,.1)+')'; x.fillRect(rnd(0,S),rnd(0,S),rnd(1,3),rnd(1,3)); }\n      // tile grout\n      x.strokeStyle='rgba(0,0,0,.18)'; x.lineWidth=4;\n      [S/2].forEach(()=>{}); x.strokeRect(0,0,S,S); x.beginPath(); x.moveTo(S/2,0);x.lineTo(S/2,S);x.moveTo(0,S/2);x.lineTo(S,S/2); x.stroke();\n    } else { // ceramic\n      for(let i=0;i<40;i++){ x.fillStyle='rgba(0,0,0,'+rnd(.01,.03)+')'; x.beginPath(); x.arc(rnd(0,S),rnd(0,S),rnd(30,90),0,7); x.fill(); }\n      x.strokeStyle='rgba(0,0,0,.14)'; x.lineWidth=3; x.strokeRect(0,0,S,S); x.beginPath(); x.moveTo(S/2,0);x.lineTo(S/2,S);x.moveTo(0,S/2);x.lineTo(S,S/2); x.stroke();\n      x.strokeStyle='rgba(255,255,255,.1)'; x.lineWidth=1; x.strokeRect(2,2,S-4,S-4);\n    }\n    // global light vignette\n    const g=x.createRadialGradient(S*.4,S*.35,20,S*.5,S*.5,S*.8);\n    g.addColorStop(0,'rgba(255,250,235,.12)'); g.addColorStop(1,'rgba(0,0,0,.12)');\n    x.fillStyle=g; x.fillRect(0,0,S,S);\n    return c.toDataURL('image/jpeg',0.82);\n  }\n  texFor(id){ return this.state.tex[id]||''; }\n\n  /* ---------- STRINGS ---------- */\n  get STR(){ return {\n    ar:{ brand:'أرضيات الديار', langBtn:'EN', whatsapp:'واتساب',\n      heroEyebr ', calcSub:'Pick a product, enter the area, get the price instantly.',\n      calcProduct:'Product', calcArea:'Area (m²)', calcMaterial:'Material', calcInstall:'Installation', calcTotal:'Total', calcQuote:'Download quote',\n      compareTitle:'Compare & choose', compareCat:'Category comparison', compareCustom:'Custom compare', compareVs:'vs', compareVerdict:'Verdict',\n      whyTitle:'Why Al-Diyar?',\n      testiTitle:'What clients say',\n      offerTitle:'Limited offer', offerText:'Full floor preview & design', offerWas:'250 SAR', offerNow:'Free', offerCta:'Book now',\n      contactTitle:'Visit us', addressLabel:'Address', address:'Al-Yasmin, Riyadh', hoursLabel:'Hours', hours:'Sat–Thu 9am–10pm', ratingLabel:'Rating', reviews:'reviews', footerNote:'A smarter way to floor.',\n      chatTitle:'Al-Diyar assistant', chatOnline:'Online now', chatPlaceholder:'Type your question...', chatToWA:'Continue on WhatsApp',\n      zoomBadge:'Zoom ×2', zoomClose:'Close',\n    }\n  }; }\n  get t(){ return this.STR[this.state.lang]; }\n  get ar(){ return this.state.lang==='ar'; }\n  pn(p){ return this.ar?p.ar:p.en; }\n\n  /* ---------- ADVISOR ---------- */\n  get ADVISOR_Q(){ return [\n    {key:'space', ar:'وش المساحة اللي تبي تغطيها؟', en:'Which space are you covering?', opts:[\n      {v:'living',ar:'مجلس / صالة',en:'Living / Majlis'},{v:'bedroom',ar:'غرفة نوم',en:'Bedroom'},{v:'kitchen',ar:'مطبخ',en:'Kitchen'},{v:'wet',ar:'حمام / مبلّل',en:'Bathroom / Wet'}]},\n    {key:'color', ar:'لون ديكورك الحالي أقرب لـ؟', en:'Your current decor leans toward?', opts:[\n      {v:'light',ar:'فاتح ومحايد',en:'Light & neutral'},{v:'warm',ar:'دافئ وترابي',en:'Warm & earthy'},{v:'grey',ar:'رمادي وحديث',en:'Grey & modern'},{v:'dark',ar:'غامق وجريء',en:'Dark & bold'}]},\n    {key:'char', ar:'الطابع اللي يعجبك؟', en:'The character you love?', opts:[\n      {v:'heritage',ar:'تراثي دافئ',en:'Warm heritage'},{v:'modern',ar:'عصري بسيط',en:'Clean modern'},{v:'lux',ar:'فخم راقي',en:'Refined luxury'},{v:'practical',ar:'عملي متين',en:'Practical & tough'}]},\n    {key:'budget', ar:'الميزانية للمتر؟', en:'Budget per m²?', opts:[\n      {v:'eco',ar:'اقتصادي',en:'Economy'},{v:'mid',ar:'متوسط',en:'Mid-range'},{v:'high',ar:'مرتفع',en:'Premium'}]},\n  ]; }\n  scoreProduct(p,a){\n    let s=0;\n    if(a.color && p.fam===a.color) s+=30;\n    if(a.char && p.char===a.char) s+=30;\n    if(a.space==='kitchen'||a.space==='wet') s += p.water*4;\n    if(a.space==='living') s += p.luxury*2 + p.warmth*2;\n    if(a.space==='bedroom') s += p.warmth*3;\n    if(a.budget==='eco') s += (170-(p.price+p.install))*0.18;\n    if(a.budget==='high') s += (p.price+p.install)*0.12 + p.luxury*3;\n    if(a.budget==='mid') s += 10 - Math.abs((p.price+p.install)-115)*0.12;\n    return s;\n  }\n  advisorReason(p,a){\n    const bits=[];\n    if(a.char===p.char){ const m={heritage:{ar:'طابع تراثي دافئ',en:'warm heritage character'},modern:{ar:'إحساس عصري بسيط',en:'clean modern feel'},lux:{ar:'فخامة راقية',en:'refined luxury'},practical:{ar:'عملي ومتين',en:'practical & tough'}}; bits.push(this.ar?m[p.char].ar:m[p.char].en); }\n    if((a.space==='kitchen'||a.space==='wet') && p.water>=5) bits.push(this.ar?'مقاومة ماء ممتازة':'excellent water resistance');\n    if(a.color===p.fam) bits.push(this.ar?'يطابق لون ديكورك':'matches your decor tone');\n    if(a.budget==='eco' && (p.price+p.install)<=120) bits.push(this.ar?'ضمن ميزانيتك':'within budget');\n    if(!bits.length) bits.push(this.ar?'توازن ممتاز بين الفخامة والمتانة':'great balance of luxury & durability');\n    return (this.ar?'لأنه ':'Because it offers ')+bits.slice(0,2).join(this.ar?' و':' and ')+'.';\n  }\n  get advisorResultsData(){\n    const a=this.state.advisorAns;\n    return this.PRODUCTS.map(p=>({p, s:this.scoreProduct(p,a)})).sort((x,y)=>y.s-x.s).slice(0,3)\n      .map((it,i)=>({ p:it.p, pct: Math.max(72, Math.min(98, Math.round(92 - i*6 + (it.s%7)))) }));\n  }\n\n  /* ---------- CHAT ---------- */\n  get FAQ(){ return [\n    {k:['سعر','أسعار','كم','بكم','price','cost','how much'], ar:'أسعارنا تبدأ من ٧٠ ر.س/م² للسيراميك، وتوصل ١٦٠ ر.س للبورسلين الفاخر. التركيب من ٢٠–٣٥ ر.س/م². استخدم الحاسبة لسعر دقيق.', en:'Prices start at 70 SAR/m² for ceramic up to 160 for premium porcelain. Installation is 20–35 SAR/m². Use the calculator for an exact quote.'},\n    {k:['تركيب','install','installation','fix'], ar:'فريقنا يركّب احترافيًا خلال ٢–٤ أيام حسب المساحة، مع تجهيز الأرضية وتنظيف بعد التركيب.', en:'Our team installs professionally in 2–4 days depending on area, including floor prep and post-install cleanup.'},\n    {k:['ضمان','warranty','guarantee'], ar:'ضمان حتى ١٥ سنة على المنتج وسنتين على التركيب ضد عيوب الصناعة.', en:'Up to 15-year product warranty and 2-year installation warranty against manufacturing defects.'},\n    {k:['صيانة','تنظيف','maintenance','clean','care'], ar:'كل أرضياتنا سهلة التنظيف بممسحة رطبة. SPC والبورسلين مقاومة ماء وخدش بشكل ممتاز.', en:'All our floors wipe clean with a damp mop. SPC and porcelain resist water and scratches very well.'},\n    {k:['حجز','موعد','زيارة','book','appointment','visit'], ar:'تقدر تحجز معاينة مجانية الحين — أرسل لنا موقعك على واتساب ونرتب الزيارة.', en:'You can book a free site visit now — send us your location on WhatsApp and we\\'ll arrange it.'},\n    {k:['ماء','رطوبة','حمام','مطبخ','water','wet','bathroom'], ar:'للمناطق الرطبة ننصح بالبورسلين أو SPC — مقاومة ماء ١٠٠٪ ومناسبة للحمامات والمطابخ.', en:'For wet areas we recommend porcelain or SPC — 100% water resistant, perfect for bathrooms and kitchens.'},\n    {k:['باركيه','خشب','parquet','wood'], ar:'الباركيه يعطي دفء وفخامة طبيعية، مثالي للمجالس وغرف النوم. عندنا جوز، بلوط، ورمادي حديث.', en:'Parquet gives natural warmth and luxury, ideal for majlis and bedrooms. We have walnut, oak, and modern grey.'},\n    {k:['توصيل','شحن','delivery','shipping'], ar:'التوصيل داخل الرياض خلال ٢٤–٤٨ ساعة، ومجاني للطلبات فوق ٣٠ م².', en:'Delivery within Riyadh in 24–48h, free for orders above 30 m².'},\n    {k:['spc','اس بي سي'], ar:'SPC أرضية مقاومة ماء وخدش، دافئة تحت القدم، وأسعارها اقتصادية — من ٩٠ ر.س/م².', en:'SPC is water- and scratch-resistant, warm underfoot, and budget-friendly — from 90 SAR/m².'},\n    {k:['لون','ألوان','color','colour'], ar:'جرّب «كاشف اللون» وارفع صورة جدارك — نختار لك الأرضية الأقرب تلقائيًا.', en:'Try the “Color detector” and upload a wall photo — we auto-pick the closest floor.'},\n    {k:['عرض','خصم','offer','discount'], ar:'عرض حالي: معاينة وتصميم أرضيتك مجانًا (بدل ٢٥٠ ر.س). احجز قبل نهاية الشهر.', en:'Current offer: free floor preview & design (worth 250 SAR). Book before month-end.'},\n    {k:['وين','موقع','عنوان','where','location','address'], ar:'معرضنا في حي الياسمين، الرياض. السبت–الخميس ٩ص–١٠م.', en:'Our showroom is in Al-Yasmin, Riyadh. Sat–Thu 9am–10pm.'},\n  ]; }\n  answerFor(text){\n    const q=text.toLowerCase();\n    const hit=this.FAQ.find(f=>f.k.some(kw=>q.includes(kw.toLowerCase())));\n    if(hit) return {text:this.ar?hit.ar:hit.en, wa:false};\n    return {text: this.ar?'سؤال ممتاز! خل أحوّلك لفريقنا على واتساب يجاوبك بالتفصيل فورًا.':'Great question! Let me connect you to our team on WhatsApp for a detailed answer.', wa:true};\n  }\n  pushUser(text){\n    if(!text.trim()) return;\n    const a=this.answerFor(text);\n    this.setState(s=>({ chatInput:'', chatMsgs:[...s.chatMsgs, {role:'user',text}, {role:'bot',text:a.text,wa:a.wa}] }));\n  }\n\n  /* ---------- AR ---------- */\n  startLineDrag=(e)=>{\n    e.preventDefault();\n    const stage=this.arStageRef.current; if(!stage) return;\n    const move=(ev)=>{\n      const r=stage.getBoundingClientRect();\n      const cy=(ev.touches?ev.touches[0].clientY:ev.clientY);\n      let pct=((cy-r.top)/r.height)*100; pct=Math.max(15,Math.min(85,pct));\n      this.setState({arLinePct:pct});\n    };\n    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };\n    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);\n  };\n  onArUpload=(e)=>{\n    const f=e.target.files&&e.target.files[0]; if(!f) return;\n    const rd=new FileReader(); rd.onload=ev=>this.setState({arImage:ev.target.result, arTab:'upload'}); rd.readAsDataURL(f);\n  };\n  startCam=async()=>{\n    try{\n      const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});\n      this._stream=st; this.setState({arCamState:'on'},()=>{ if(this.arVideoRef.current) this.arVideoRef.current.srcObject=st; });\n    }catch(err){ this.setState({arCamState:'denied'}); }\n  };\n  saveAR=()=>{\n    const img=this.state.arImage; if(!img){ return; }\n    const im=new Image(); im.onload=()=>{\n      const W=im.width,H=im.height,c=document.createElement('canvas'); c.width=W;c.height=H;\n      const x=c.getContext('2d'); x.drawImage(im,0,0,W,H);\n      const tex=new Image(); tex.onload=()=>{\n        const ly=H*(this.state.arLinePct/100);\n        const pat=x.createPattern(tex,'repeat');\n        x.save(); x.globalAlpha=.88; x.globalCompositeOperation='multiply';\n        x.fillStyle=pat; x.fillRect(0,ly,W,H-ly);\n        x.restore();\n        x.fillStyle='rgba(0,0,0,.2)'; x.fillRect(0,ly,W,(H-ly)*0.4);\n        const a=document.createElement('a'); a.href=c.toDataURL('image/jpeg',0.9); a.download='diyar-ar.jpg'; a.click();\n      }; tex.src=this.texFor(this.state.arFloor);\n    }; im.src=img;\n  };\n\n  /* ---------- COLOR DETECTOR ---------- */\n  onColorUpload=(e)=>{\n    const f=e.target.files&&e.target.files[0]; if(!f) return;\n    const rd=new FileReader(); rd.onload=ev=>{\n      const im=new Image(); im.onload=()=>{\n        const c=document.createElement('canvas'); c.width=40;c.height=40;\n        const x=c.getContext('2d'); x.drawImage(im,0,0,40,40);\n        const d=x.getImageData(0,0,40,40).data; let r=0,g=0,b=0,n=0;\n        for(let i=0;i<d.length;i+=4){ r+=d[i];g+=d[i+1];b+=d[i+2];n++; }\n        r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);\n        const hex='#'+[r,g,b].map(v=>v.t
