function shade(hex,amt){
  let c=hex.replace('#','');
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function genTexture(type,base,dark){
  const S=320,c=document.createElement('canvas');c.width=S;c.height=S;
  const x=c.getContext('2d');const rnd=(a,b)=>a+Math.random()*(b-a);
  x.fillStyle=base;x.fillRect(0,0,S,S);
  if(type==='wood'||type==='spc'){
    const ph=type==='spc'?80:64;
    for(let y=0;y<S;y+=ph){
      const off=Math.floor(rnd(-12,12));x.fillStyle=shade(base,off);x.fillRect(0,y,S,ph);
      for(let i=0;i<26;i++){
        x.strokeStyle='rgba(0,0,0,'+rnd(.03,.09)+')';x.lineWidth=rnd(.5,1.4);x.beginPath();
        const gy=y+rnd(2,ph-2);x.moveTo(0,gy);
        for(let gx=0;gx<=S;gx+=20){x.lineTo(gx,gy+Math.sin(gx/30+i)*rnd(.5,2));}
        x.stroke();
      }
      x.strokeStyle='rgba(0,0,0,.18)';x.lineWidth=type==='spc'?2:1.4;x.beginPath();x.moveTo(0,y);x.lineTo(S,y);x.stroke();
      x.strokeStyle='rgba(255,255,255,.06)';x.beginPath();x.moveTo(0,y+1.5);x.lineTo(S,y+1.5);x.stroke();
    }
  } else if(type==='marble'){
    for(let i=0;i<60;i++){x.fillStyle='rgba(0,0,0,'+rnd(.01,.03)+')';x.beginPath();x.arc(rnd(0,S),rnd(0,S),rnd(20,70),0,7);x.fill();}
    for(let v=0;v<5;v++){
      x.strokeStyle='rgba('+(dark?'80,78,70':'150,146,138')+','+rnd(.25,.5)+')';x.lineWidth=rnd(1,3);x.beginPath();
      let px=rnd(0,S),py=0;x.moveTo(px,py);
      while(py<S){px+=rnd(-40,40);py+=rnd(20,50);x.lineTo(px,py);}
      x.stroke();
    }
  } else if(type==='stone'){
    for(let i=0;i<2600;i++){x.fillStyle='rgba('+(Math.random()<.5?'255,255,255':'0,0,0')+','+rnd(.02,.08)+')';x.fillRect(rnd(0,S),rnd(0,S),rnd(1,3),rnd(1,3));}
    for(let i=0;i<30;i++){x.fillStyle='rgba(0,0,0,'+rnd(.02,.05)+')';x.beginPath();x.arc(rnd(0,S),rnd(0,S),rnd(8,26),0,7);x.fill();}
  } else if(type==='clay'){
    for(let i=0;i<2200;i++){x.fillStyle='rgba('+(Math.random()<.5?'255,230,200':'90,40,20')+','+rnd(.03,.1)+')';x.fillRect(rnd(0,S),rnd(0,S),rnd(1,3),rnd(1,3));}
    x.strokeStyle='rgba(0,0,0,.18)';x.lineWidth=4;x.strokeRect(0,0,S,S);
    x.beginPath();x.moveTo(S/2,0);x.lineTo(S/2,S);x.moveTo(0,S/2);x.lineTo(S,S/2);x.stroke();
  } else {
    for(let i=0;i<40;i++){x.fillStyle='rgba(0,0,0,'+rnd(.01,.03)+')';x.beginPath();x.arc(rnd(0,S),rnd(0,S),rnd(30,90),0,7);x.fill();}
    x.strokeStyle='rgba(0,0,0,.14)';x.lineWidth=3;x.strokeRect(0,0,S,S);
    x.beginPath();x.moveTo(S/2,0);x.lineTo(S/2,S);x.moveTo(0,S/2);x.lineTo(S,S/2);x.stroke();
    x.strokeStyle='rgba(255,255,255,.1)';x.lineWidth=1;x.strokeRect(2,2,S-4,S-4);
  }
  const g=x.createRadialGradient(S*.4,S*.35,20,S*.5,S*.5,S*.8);
  g.addColorStop(0,'rgba(255,250,235,.12)');g.addColorStop(1,'rgba(0,0,0,.12)');
  x.fillStyle=g;x.fillRect(0,0,S,S);
  return c.toDataURL('image/jpeg',0.82);
}

function scoreProduct(p,a){
  let s=0;
  if(a.color && p.fam===a.color) s+=30;
  if(a.char && p.char===a.char) s+=30;
  if(a.space==='kitchen'||a.space==='wet'||a.space==='outdoor') s+=p.water*4;
  if(a.space==='living') s+=p.luxury*2+p.warmth*2;
  if(a.space==='bedroom') s+=p.warmth*3;
  if(a.budget==='eco') s+=(100-(p.price+p.install))*0.18;
  if(a.budget==='high') s+=(p.price+p.install)*0.12+p.luxury*3;
  if(a.budget==='mid') s+=10-Math.abs((p.price+p.install)-70)*0.12;
  return s;
}
function advisorReason(p,a){
  const bits=[];
  if(a.char===p.char){const m={heritage:{ar:'طابع تراثي دافئ',en:'warm heritage character'},modern:{ar:'إحساس عصري بسيط',en:'clean modern feel'},lux:{ar:'فخامة راقية',en:'refined luxury'},practical:{ar:'عملي ومتين',en:'practical & tough'}};bits.push(isAR()?m[p.char].ar:m[p.char].en);}
  if((a.space==='kitchen'||a.space==='wet'||a.space==='outdoor')&&p.water>=5)bits.push(isAR()?'مقاومة ماء ممتازة':'excellent water resistance');
  if(a.color===p.fam)bits.push(isAR()?'يطابق لون ديكورك':'matches your decor tone');
  if(a.budget==='eco'&&(p.price+p.install)<=75)bits.push(isAR()?'ضمن ميزانيتك':'within budget');
  if(!bits.length)bits.push(isAR()?'توازن ممتاز بين الفخامة والمتانة':'great balance of luxury & durability');
  return (isAR()?'لأنه ':'Because it offers ')+bits.slice(0,2).join(isAR()?' و':' and ')+'.';
}
function getAdvisorResults(){
  const a=S.advisorAns;
  return PRODUCTS.map(p=>({p,s:scoreProduct(p,a)})).sort((x,y)=>y.s-x.s).slice(0,3)
    .map((it,i)=>({p:it.p,pct:Math.max(72,Math.min(98,Math.round(92-i*6+(it.s%7))))}));
}
function compareSentence(a,b){
  if(a.id===b.id) return isAR()?'اختر منتجين مختلفين للمقارنة.':'Pick two different products to compare.';
  const cheaper=(a.price+a.install)<=(b.price+b.install)?a:b;
  const lux=a.luxury>=b.luxury?a:b;
  const water=a.water>=b.water?a:b;
  if(isAR()){
    return pn(a)+' و'+pn(b)+': '+pn(cheaper)+' أوفر سعرًا، بينما '+pn(lux)+' يعطي فخامة أعلى. '+
      (water.water>=5?('للمناطق الرطبة، '+pn(water)+' الأنسب لمقاومته العالية للماء.'):('كلاهما مناسب للمناطق الجافة.'));
  }
  return pn(a)+' vs '+pn(b)+': '+pn(cheaper)+' is more affordable, while '+pn(lux)+' feels more luxurious. '+
    (water.water>=5?('For wet areas, '+pn(water)+' fits best with its high water resistance.'):('Both suit dry areas.'));
}

function startLineDrag(e){
  e.preventDefault();
  const stage=document.getElementById('ar-stage');if(!stage)return;
  const move=(ev)=>{
    const r=stage.getBoundingClientRect();
    const cy=ev.clientY;
    let pct=((cy-r.top)/r.height)*100;pct=Math.max(15,Math.min(85,pct));
    S.arLinePct=pct;
    const ov=document.getElementById('ar-floor-ov');if(ov)ov.style.top=pct+'%';
    const dh=document.getElementById('ar-drag-h');if(dh)dh.style.top=pct+'%';
  };
  const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);setState({arLinePct:S.arLinePct});};
  window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
}
function onArUpload(e){
  const f=e.target.files&&e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>setState({arImage:ev.target.result,arTab:'upload'});rd.readAsDataURL(f);
}

function saveAR(){
  const img=S.arImage;if(!img)return;
  const im=new Image();im.onload=()=>{
    const W=im.width,H=im.height,c=document.createElement('canvas');c.width=W;c.height=H;
    const x=c.getContext('2d');x.drawImage(im,0,0,W,H);
    const tex=new Image();tex.onload=()=>{
      const ly=H*(S.arLinePct/100);
      const pat=x.createPattern(tex,'repeat');
      x.save();x.globalAlpha=.88;x.globalCompositeOperation='multiply';
      x.fillStyle=pat;x.fillRect(0,ly,W,H-ly);x.restore();
      x.fillStyle='rgba(0,0,0,.2)';x.fillRect(0,ly,W,(H-ly)*0.4);
      const a=document.createElement('a');a.href=c.toDataURL('image/jpeg',0.9);a.download='diyar-ar.jpg';a.click();
    };tex.src=texFor(S.arFloor);
  };im.src=img;
}

function onColorUpload(e){
  const f=e.target.files&&e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>{
    const im=new Image();im.onload=()=>{
      const c=document.createElement('canvas');c.width=40;c.height=40;
      const x=c.getContext('2d');x.drawImage(im,0,0,40,40);
      const d=x.getImageData(0,0,40,40).data;let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
      r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
      const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
      let best=null,bd=1e9;
      PRODUCTS.forEach(p=>{const pc=hexRgb(p.color);const dist=Math.hypot(pc[0]-r,pc[1]-g,pc[2]-b);if(dist<bd){bd=dist;best=p;}});
      setState({colorImg:ev.target.result,colorDom:hex,colorMatch:best.id});
    };im.src=ev.target.result;
  };rd.readAsDataURL(f);
}

// ============================================================
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs){
    for(const[k,v]of Object.entries(attrs)){
      if(k==='style'&&typeof v==='string') el.style.cssText=v;
      else if(k==='className') el.className=v;
      else if(k==='htmlFor') el.setAttribute('for',v);
      else if(k.startsWith('on')&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='dangerouslySetInnerHTML') el.innerHTML=v.__html;
      else el.setAttribute(k,v);
    }
  }
  for(const child of children){
    if(child==null||child===false)continue;
    if(typeof child==='string'||typeof child==='number') el.appendChild(document.createTextNode(String(child)));
    else if(child instanceof Node) el.appendChild(child);
    else if(Array.isArray(child)) child.forEach(c=>{ if(c instanceof Node)el.appendChild(c); else if(c!=null&&c!==false)el.appendChild(document.createTextNode(String(c))); });
  }
  return el;
}

        h('div',{style:`font-family:'${hf}',serif;font-size:18px;margin-bottom:4px;`},pn(zp)),
        h('p',{style:'margin:0 0 14px;font-size:12.5px;color:#cabfa3;line-height:1.55;'},zoomDesc(zp)),
        h('div',{style:'display:flex;gap:8px;'},
          h('button',{style:`flex:1;background:${acl};color:#2b281f;border:0;padding:10px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;`,onClick:()=>{setState({calcProductId:zp.id,zoom:null});goSection('calc');}},tr.catCalc),
          h('button',{style:'background:rgba(255,255,255,.1);color:#f6f0e3;border:1px solid rgba(201,162,75,.4);padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;',onClick:()=>setState({zoom:null})},tr.zoomClose)
        )
      )
    )
  );
}

// ============================================================
// INIT
// ============================================================
// Initial paint (solid colors)
render();

// Generate all textures once, then a single re-render (no per-texture flicker)
setTimeout(()=>{
  PRODUCTS.forEach(p=>{
    const dataUrl=genTexture(p.tx,p.color,p.tx2);
    S.tex[p.id]=dataUrl;
    const img=new Image();img.src=dataUrl;_texImgs[p.id]=img;
  });
  render();
},60);
</script>
</body>
